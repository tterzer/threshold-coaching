<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM2L Racing — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bc:#0a0a0a;--bc2:#111;--bc3:#1a1a1a;--bc4:#222;--acc:#c8f036;--tc:#f0f0f0;--tc2:#999;--tc3:#555;--border:#2a2a2a;}
html,body{height:100%}
body{background:var(--bc);color:var(--tc);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
a{color:var(--acc);text-decoration:none}
nav{background:rgba(10,10,10,0.95);border-bottom:1px solid var(--border);padding:0 2rem}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;height:56px}
.nav-logo img{height:32px;width:auto;display:block}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 2rem}
.content{max-width:600px;width:100%}
.page-heading{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;text-transform:uppercase;letter-spacing:-0.01em;margin-bottom:2rem}
.field{margin-bottom:1rem}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--tc3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:var(--bc3);border:1px solid var(--border);color:var(--tc);padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--acc)}
.field-help{font-family:'DM Mono',monospace;font-size:10px;color:var(--tc3);margin-top:4px;letter-spacing:0.04em}
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap .pw-input{width:100%;padding-right:40px}
.pw-toggle{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:var(--tc3);padding:0;display:flex;align-items:center;transition:color 0.2s}
.pw-toggle:hover{color:var(--tc2)}
.pw-toggle svg{width:16px;height:16px}
.register-btn{font-family:'DM Mono',monospace;font-size:12px;background:var(--acc);color:#000;padding:12px 28px;cursor:pointer;letter-spacing:0.04em;border:none;font-weight:400;width:100%;margin-top:0.5rem}
.register-btn:disabled{opacity:0.5;cursor:not-allowed}
.reg-error{font-family:'DM Mono',monospace;font-size:11px;color:#E24B4A;margin-top:0.75rem;display:none}
.reg-success{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);margin-top:0.75rem;display:none;background:rgba(200,240,54,0.1);border:1px solid var(--acc);padding:10px 14px}
.back-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--tc3);letter-spacing:0.08em;text-transform:uppercase;display:inline-block;margin-top:2rem}
.back-link:hover{color:var(--tc2)}
@media(max-width:540px){
  .page-heading{font-size:40px}
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/"><img src="/hm2l_logo_transparent.png" alt="HM2L Racing" /></a>
  </div>
</nav>
<div class="main">
  <div class="content">
    <img src="/hm2l_logo_transparent.png" style="height:160px;width:auto;display:block;margin:0 auto 2rem">
    <div class="page-heading">Create your account.</div>

    <div class="field"><label>Full name</label><input type="text" id="regName" placeholder="Your name" required autocomplete="name" /></div>
    <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email" /></div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="regPassword" class="pw-input" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8" />
        <button type="button" class="pw-toggle" onclick="togglePw('regPassword', this)" tabindex="-1" aria-label="Toggle password visibility">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <div class="pw-wrap">
        <input type="password" id="regConfirm" class="pw-input" placeholder="Repeat password" required autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()" />
        <button type="button" class="pw-toggle" onclick="togglePw('regConfirm', this)" tabindex="-1" aria-label="Toggle password visibility">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Intervals.icu Athlete ID</label>
      <input type="text" id="regAthleteId" placeholder="e.g. i12345" required />
      <div class="field-help">Find this in your intervals.icu URL: intervals.icu/athlete/i00000</div>
    </div>
    <div class="field">
      <label>Intervals.icu API Key</label>
      <div class="pw-wrap">
        <input type="password" id="regApiKey" class="pw-input" placeholder="Your API key" required />
        <button type="button" class="pw-toggle" onclick="togglePw('regApiKey', this)" tabindex="-1" aria-label="Toggle API key visibility">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <div class="field-help">Settings → API → copy your API key</div>
    </div>

    <div class="reg-error" id="regError"></div>
    <div class="reg-success" id="regSuccessMsg">Account created successfully! Redirecting to login...</div>
    <button class="register-btn" id="registerBtn" onclick="doRegister()">Create account</button>

    <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--tc3);margin-top:1.5rem">
      Already have an account? <a href="/login.html" style="color:var(--acc)">Log in →</a>
    </p>
    <a class="back-link" href="/index.html">&#8592; Back to site</a>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.querySelector('.eye-icon').style.display = isText ? '' : 'none';
  btn.querySelector('.eye-off-icon').style.display = isText ? 'none' : '';
}

function showError(msg) {
  const el = document.getElementById('regError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const athleteId = document.getElementById('regAthleteId').value.trim();
  const apiKey = document.getElementById('regApiKey').value.trim();
  const errEl = document.getElementById('regError');
  const btn = document.getElementById('registerBtn');

  errEl.style.display = 'none';

  if (!name || !email || !password || !confirm || !athleteId || !apiKey) {
    showError('All fields are required'); return;
  }
  if (password !== confirm) { showError('Passwords do not match'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }

  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'register', name, email, password, intervals_athlete_id: athleteId, intervals_api_key: apiKey })
    });
    const data = await res.json();
    if (!res.ok || data.error) { showError(data.error || 'Registration failed'); btn.disabled = false; btn.textContent = 'Create account'; return; }
    document.getElementById('regSuccessMsg').style.display = 'block';
    setTimeout(() => { window.location.href = '/login.html?registered=1'; }, 1200);
  } catch(e) {
    showError(e.message || 'Registration failed');
    btn.disabled = false; btn.textContent = 'Create account';
  }
}
</script>
</body>
</html>
